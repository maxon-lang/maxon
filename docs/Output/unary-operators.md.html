<p>Unary operators operate on a single value.</p>
<h3 id="operators">Operators</h3>
<ul>
<li><code>-</code> - Negate (flip sign of number)</li>
<li><code>+</code> - Identity (no change, rarely used)</li>
</ul>
<h3 id="example">Example</h3>
<pre><code class="language-maxon">function main() int
    var x = 42
    var y = -x      // y is -42
    var z = -y      // z is 42
    return z
end 'main'
</code></pre>
