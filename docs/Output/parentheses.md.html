<p>Parentheses group expressions and control evaluation order.</p>
<h3 id="syntax">Syntax</h3>
<pre><code class="language-maxon">(expression)
</code></pre>
<h3 id="example">Example</h3>
<pre><code class="language-maxon">function main() int
    var a = 2 + 3 * 4      // 14 (multiply first)
    var b = (2 + 3) * 4    // 20 (add first)
    return b
end 'main'
</code></pre>
