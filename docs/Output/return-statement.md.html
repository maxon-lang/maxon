<p>The <code>return</code> statement exits the current function and optionally returns a value to the caller.</p>
<h3 id="syntax">Syntax</h3>
<pre><code class="language-maxon">return expression
</code></pre>
<h3 id="example">Example</h3>
<pre><code class="language-maxon">function isPositive(x int) bool
    if x &gt; 0 'check'
        return true
    end 'check'
    return false
end 'isPositive'
</code></pre>
