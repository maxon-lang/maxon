name: Validate Specs

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build jq

      - name: Cache LLVM
        uses: actions/cache@v4
        with:
          path: llvm-project
          key: llvm-${{ runner.os }}-${{ hashFiles('llvm-config.txt') }}

      - name: Build compiler
        run: make compiler

      - name: Validate spec coverage
        run: make validate-specs
